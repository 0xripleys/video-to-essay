name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check

      - name: Pure tests
        run: uv run pytest tests/ -x --ignore=tests/test_smoke.py --ignore=tests/db/

      - name: Database tests
        run: uv run pytest tests/db/ -x

      - name: Smoke tests (import + lint)
        run: uv run pytest tests/test_smoke.py -x -k "not nextjs_build"

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npm run build
